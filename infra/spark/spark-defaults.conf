# Spark defaults inherited by the Spark Connect server and every session.
# Defines the Iceberg REST catalog backed by Polaris on MinIO (Session A writer).

spark.sql.extensions                                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg catalog "ice" -> Polaris REST (same warehouse StarRocks reads from).
spark.sql.catalog.ice                               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.ice.type                          rest
spark.sql.catalog.ice.uri                           http://polaris:8181/api/catalog
spark.sql.catalog.ice.warehouse                     polaris_catalog
spark.sql.catalog.ice.credential                    root:s3cr3t
spark.sql.catalog.ice.scope                         PRINCIPAL_ROLE:ALL
spark.sql.catalog.ice.oauth2-server-uri             http://polaris:8181/api/catalog/v1/oauth/tokens
spark.sql.catalog.ice.io-impl                       org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.ice.s3.endpoint                   http://minio:9000
spark.sql.catalog.ice.s3.path-style-access          true
spark.sql.catalog.ice.s3.access-key-id              admin
spark.sql.catalog.ice.s3.secret-access-key          password123
spark.sql.catalog.ice.client.region                 us-east-1

spark.sql.defaultCatalog                            ice
# local[*] mode: the driver is also the executor. Heavy COW MERGE over 50 rounds OOM'd at
# 2g ("stopped SparkContext"), so give it plenty (StarRocks excluded -> RAM available).
# Raised 6g->8g: the heaviest combo (v3-cow/every_round, ~4.8M-row COW + compact every round)
# crashed the Connect server at round 48 with 6g/8g-cap; VM has headroom (24g) so widen it.
spark.driver.memory                                 8g
spark.driver.maxResultSize                          2g
spark.sql.shuffle.partitions                        8
# Tolerate brief stalls under the heaviest MERGE+compact so a transient pause doesn't kill the
# Connect server (root cause of the round-48 abrupt death).
spark.network.timeout                               600s
spark.rpc.askTimeout                                600s
# GC tuning to suppress long stop-the-world pauses that show up as one-off load/compact spikes.
# In local[*] the driver JVM is also the executor, so this governs the whole engine.
#   G1GC + MaxGCPauseMillis -> short incremental collections instead of long full GCs.
#   IHOP=35 -> start concurrent GC early (before the heap fills), so a collection is more
#              likely to land in the pre-step settle gap than mid-measurement.
#   AlwaysPreTouch -> fault in heap pages at startup, avoiding page-fault spikes while timing.
spark.driver.extraJavaOptions                       -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=35 -XX:+AlwaysPreTouch
