name: iceberg-v3-mor
adapter: iceberg_spark
write_engine: spark
table_format: iceberg
mode: mor
catalog: polaris
iceberg_format_version: 3
table_properties:
  write.delete.mode: merge-on-read
  write.update.mode: merge-on-read
  write.merge.mode: merge-on-read
capabilities:
  upsert: true
  # StarRocks 3.5/4.1 cannot read Iceberg v3 MOR deletion vectors ("Parquet file magic not
  # matched") — exclude it from StarRocks reads (runner skips this engine for this candidate).
  starrocks_read: false
